spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/exam_mvp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3s}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VHOST:/}
  jackson:
    default-property-inclusion: non_null
  flyway:
    locations: classpath:db/migration,classpath:db/dev-seed
    out-of-order: true

app:
  exam:
    timeout-scan-interval-ms: ${APP_EXAM_TIMEOUT_SCAN_INTERVAL_MS:15000}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:question-images}
    public-read: ${MINIO_PUBLIC_READ:true}
