spring:
  application:
    name: exam
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/exam_mvp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3s}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VHOST:/}
  jackson:
    default-property-inclusion: non_null
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 3

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:16730}

jwt:
  issuer: ${JWT_ISSUER:exam-system}
  secret: ${JWT_SECRET:}
  access-token-expire-minutes: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:120}
  refresh-token-expire-days: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:7}

app:
  exam:
    timeout-scan-interval-ms: ${APP_EXAM_TIMEOUT_SCAN_INTERVAL_MS:15000}
  cors:
    allowed-origins:
      - ${APP_CORS_ORIGIN_1:http://localhost:5173}
      - ${APP_CORS_ORIGIN_2:http://127.0.0.1:5173}
  auth:
    cookie:
      name: ${APP_AUTH_COOKIE_NAME:exam_refresh_token}
      path: ${APP_AUTH_COOKIE_PATH:/api/v1/auth}
      http-only: ${APP_AUTH_COOKIE_HTTP_ONLY:true}
      secure: ${APP_AUTH_COOKIE_SECURE:false}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
      max-age-seconds: ${APP_AUTH_COOKIE_MAX_AGE_SECONDS:604800}
    rate-limit:
      key-prefix: ${APP_AUTH_RATE_LIMIT_KEY_PREFIX:auth:rate-limit:}
      window-seconds: ${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      login-limit: ${APP_AUTH_RATE_LIMIT_LOGIN_LIMIT:10}
      refresh-limit: ${APP_AUTH_RATE_LIMIT_REFRESH_LIMIT:30}
  snapshot:
    flush-interval-ms: ${APP_SNAPSHOT_FLUSH_INTERVAL_MS:30000}
    ttl-hours: ${APP_SNAPSHOT_TTL_HOURS:48}
  rabbitmq:
    exam-submission:
      exchange: ${APP_RABBIT_EXAM_SUBMISSION_EXCHANGE:exam.submission.exchange}
      queue: ${APP_RABBIT_EXAM_SUBMISSION_QUEUE:exam.submission.process.queue}
      routing-key: ${APP_RABBIT_EXAM_SUBMISSION_ROUTING_KEY:exam.submission.process}
      dlx: ${APP_RABBIT_EXAM_SUBMISSION_DLX:exam.submission.dlx}
      dlq: ${APP_RABBIT_EXAM_SUBMISSION_DLQ:exam.submission.process.dlq}
  security:
    default-password: ${APP_DEFAULT_PASSWORD:}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:19000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:19000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:question-images}
    public-read: ${MINIO_PUBLIC_READ:true}
  asset-cleanup:
    enabled: ${APP_ASSET_CLEANUP_ENABLED:true}
    startup-run: ${APP_ASSET_CLEANUP_STARTUP_RUN:true}
    interval-ms: ${APP_ASSET_CLEANUP_INTERVAL_MS:600000}
    orphan-grace-minutes: ${APP_ASSET_CLEANUP_ORPHAN_GRACE_MINUTES:30}
    minio-prefix: ${APP_ASSET_CLEANUP_MINIO_PREFIX:question/}

logging:
  level:
    root: info
    com.ekusys.exam: debug
